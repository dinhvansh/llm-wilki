# ============================================================
# LLM Wiki - Docker Compose
# ============================================================
services:
  frontend:
    build:
      context: ./llm-wiki
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_USE_REAL_API: "true"
        NEXT_PUBLIC_API_BASE_URL: /backend-api
        NEXT_PUBLIC_DRAWIO_BASE_URL: http://localhost:18081
        API_PROXY_TARGET: http://backend:8000/api
    container_name: llm-wiki-frontend
    ports:
      - "3100:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_USE_REAL_API=true
      - NEXT_PUBLIC_API_BASE_URL=/backend-api
      - API_PROXY_TARGET=http://backend:8000/api
      - NEXT_PUBLIC_DRAWIO_BASE_URL=http://localhost:18081
    depends_on:
      backend:
        condition: service_healthy
      drawio:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llm-wiki-backend
    ports:
      - "18000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - backend_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llm-wiki-worker
    env_file:
      - ./backend/.env
    volumes:
      - backend_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["python", "-m", "app.worker"]
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: llm-wiki-postgres
    environment:
      POSTGRES_DB: llmwiki
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d llmwiki"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: llm-wiki-redis
    ports:
      - "56379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: llm-wiki-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  drawio:
    image: jgraph/drawio:latest
    container_name: llm-wiki-drawio
    ports:
      - "18081:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  backend_data:
  postgres_data:
  redis_data:
  minio_data:
